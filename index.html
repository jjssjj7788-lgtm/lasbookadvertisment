<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라스북 선물 꾸러미</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="container" style="position:relative;">
            <div class="logo" style="position:relative; z-index:20;">
                <h1>라스북 선물 꾸러미</h1>
                <p class="tagline">보급자의 수익 창출, 학부모의 혜택 극대화</p>
            </div>
            <!-- 귀여운 캐릭터들 (둥둥 떠다님) -->
            <img src="assets/seal.png" class="cute-char char-seal" alt="보라색 물개">
            <img src="assets/rabbit.png" class="cute-char char-rabbit" alt="핑크색 토끼">
            <img src="assets/monkey.png" class="cute-char char-monkey" alt="초록색 원숭이">
            <img src="assets/fox.jpg" class="cute-char char-fox" alt="노란색 여우">
        </div>
    </header>

    <!-- 귀여운 단체 사진 배너 -->
    <div style="max-width:800px; margin: -20px auto 30px; padding: 0 20px; text-align:center; position:relative; z-index:10;">
        <img src="assets/group.jpg" alt="캐릭터 단체 사진" style="width:100%; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); border: 5px solid white;">
    </div>


    <!-- 자료실 섹션 -->
    <section id="gallery" class="gallery">
        <div class="container">
            <h2 class="section-title">자료실</h2>
            <p class="section-subtitle">라스북의 다양한 자료를 한 곳에서 만나보세요</p>
            
            <div style="text-align: right; margin-bottom: 20px;">
                <button id="openUploadBtn" class="btn btn-primary hidden" style="margin:0;">새 자료 업로드</button>
                <button id="logoutBtn" class="btn btn-secondary hidden" style="margin:0 0 0 10px;">로그아웃</button>
            </div>
            
            <div class="gallery-grid" id="dynamicGallery">
                <p style="text-align:center; grid-column: 1 / -1; color:#999; padding: 40px;">자료를 불러오는 중입니다...</p>
            </div>
        </div>
    </section>




    <!-- 푸터 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 라스북(Rasbook). 모든 권리 보유. <a href="#" id="openLoginBtn" style="color:#aaa; text-decoration:none; margin-left:20px;">[관리자]</a></p>
        </div>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>

    <!-- 관리자 로그인 모달 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeLoginBtn">&times;</span>
            <h2>관리자 로그인</h2>
            <input type="email" id="adminEmail" placeholder="이메일 (관리자 계정)">
            <input type="password" id="adminPassword" placeholder="비밀번호">
            <p id="loginError" style="color:red; font-size:14px; margin-top:10px;"></p>
            <button id="loginBtn" class="btn btn-primary" style="margin:20px 0 0 0; width:100%;">로그인</button>
        </div>
    </div>

    <!-- 새 자료 업로드 모달 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeUploadBtn">&times;</span>
            <h2>새 자료 업로드</h2>
            <input type="text" id="uploadTitle" placeholder="가장 크게 보일 제목 (예: 상하이 박람회)" style="font-size:18px; font-weight:bold; border:2px solid var(--primary-color);">
            <div class="form-group" style="margin: 15px 0; background:#f9f9f9; padding:15px; border-radius:10px;">
                <label style="display:block; margin-bottom:10px; font-weight:bold;">이 게시물의 성격 뱃지 (다중 선택 가능)</label>
                <div style="display:flex; gap:15px; flex-wrap:wrap; font-size:14px;">
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="video"> 🎥 영상</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="image"> 🖼️ 이미지</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="audio"> 🎙️ 음성</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="doc"> 📄 문서</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="link"> 🌐 외부 링크</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="uploadTags" value="poster"> 📋 포스터</label>
                </div>
            </div>
            <input type="text" id="uploadDesc" placeholder="간단한 설명">
            <div class="form-group">
                <label>영상 썸네일 (대표 이미지) - 선택 사항</label>
                <input type="file" id="uploadThumbnail" accept="image/*" class="thumbnail-input">
            </div>
            <div class="form-group">
                <label>본문 파일 업로드 (여러 개 동시 선택 가능)</label>
                <input type="file" id="uploadFile" accept="image/*,video/*,application/pdf" multiple>
                <input type="url" id="uploadLink" placeholder="또는 외부 링크 URL (1개만 입력 가능)">
            </div>
            <p id="uploadStatus" style="color:blue; font-size:14px; margin-top:10px;"></p>
            <button id="submitUploadBtn" class="btn btn-primary" style="margin:20px 0 0 0; width:100%;">업로드 완료</button>
        </div>
    </div>

    <!-- 자료 수정 모달 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeEditBtn">&times;</span>
            <h2>자료 수정하기</h2>
            <input type="hidden" id="editDocId">
            <input type="text" id="editTitle" placeholder="가장 크게 보일 제목 (예: 상하이 박람회)" style="font-size:18px; font-weight:bold; border:2px solid var(--primary-color);">
            <div class="form-group" style="margin: 15px 0; background:#f9f9f9; padding:15px; border-radius:10px;">
                <label style="display:block; margin-bottom:10px; font-weight:bold;">이 게시물의 성격 뱃지 (다중 선택 가능)</label>
                <div style="display:flex; gap:15px; flex-wrap:wrap; font-size:14px;">
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="video"> 🎥 영상</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="image"> 🖼️ 이미지</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="audio"> 🎙️ 음성</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="doc"> 📄 문서</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="link"> 🌐 외부 링크</label>
                    <label style="cursor:pointer;"><input type="checkbox" name="editTags" value="poster"> 📋 포스터</label>
                </div>
            </div>
            <input type="text" id="editDesc" placeholder="간단한 설명">
            <p style="font-size:12px; color:#666; margin-top:10px;">* 첨부파일이나 썸네일을 바꾸려면 이 글을 삭제하고 새로 업로드해주세요.</p>
            <p id="editStatus" style="color:blue; font-size:14px; margin-top:10px;"></p>
            <button id="submitEditBtn" class="btn btn-secondary" style="margin:20px 0 0 0; width:100%;">수정 완료</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
